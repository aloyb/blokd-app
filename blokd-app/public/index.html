<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blok D - Iuran Bulanan 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #E8F4FD 0%, #FFFFFF 100%);
      min-height: 100vh;
      color: #333;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
    }
    
    .logo {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    h1 {
      font-size: 32px;
      color: #000;
      margin-bottom: 5px;
    }
    
    .subtitle {
      color: #888;
      font-size: 14px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(128,128,128,0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(77,124,229,0.1);
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #4D7CE5;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }
    
    .stat-card.warning .stat-value {
      color: #ff9f43;
    }
    
    .stat-card.danger .stat-value {
      color: #ff4757;
    }
    
    .members-section {
      background: rgba(77,124,229,0.05);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
    }
    
    .search-box {
      margin-bottom: 20px;
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(128,128,128,0.15);
      border: 1px solid rgba(128,128,128,0.25);
      border-radius: 10px;
      color: #333;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      border-color: rgba(77,124,229,0.5);
      background: rgba(128,128,128,0.2);
    }
    
    .search-box input::placeholder {
      color: #666;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding: 16px 0;
    }
    
    .pagination button {
      background: rgba(128,128,128,0.25);
      border: 1px solid rgba(128,128,128,0.3);
      color: #333;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .pagination button:hover:not(:disabled) {
      background: rgba(128,128,128,0.3);
      border-color: rgba(77,124,229,0.5);
    }
    
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .pagination .page-info {
      color: #888;
      font-size: 14px;
    }
    
    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .member-card {
      background: rgba(128,128,128,0.15);
      border-radius: 12px;
      padding: 16px;
      min-height: 100px;
    }
    
    .members-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .member-house {
      font-size: 18px;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }
    
    .member-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #000;
    }
    
    .member-status {
      font-size: 13px;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    
    .member-status.negative {
      background: rgba(255,71,87,0.2);
      border: 1px solid #ff4757;
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
      color: #ff4757;
      font-weight: bold;
    }
    
    .member-paid {
      font-size: 11px;
      color: #666;
    }
    
    .exception-badge {
      background: #ff9f43;
      color: #000;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: bold;
      margin-bottom: 6px;
      display: inline-block;
    }
    
    .months-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      justify-content: center;
    }
    
    .month-item {
      background: rgba(77,124,229,0.2);
      border: 1px solid #4D7CE5;
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
    }
    
    .month-item.paid {
      background: rgba(77,124,229,0.2);
      border: 1px solid #4D7CE5;
    }
    
    .month-name {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      color: #4D7CE5;
    }
    
    .month-amount {
      font-size: 10px;
      color: #888;
    }
    
    .month-item.paid .month-amount {
      color: #4D7CE5;
    }
    
    .progress-bar {
      background: rgba(128,128,128,0.25);
      border-radius: 10px;
      height: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    
    .progress-fill {
      background: linear-gradient(90deg, #4D7CE5, #00cc6a);
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
    
    .footer {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 12px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    .error {
      text-align: center;
      padding: 40px;
      color: #ff4757;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><img src="/logo.png" alt="Logo" style="height:40px;"></div>
      <h1>BLOK D</h1>
      <div class="subtitle">Iuran Bulanan Tahun 2026</div>
    </header>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="total-collected">-</div>
        <div class="stat-label">Total Dana Terkumpul</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-value" id="collect-percent">-</div>
        <div class="stat-label">Dana Yang Sudah disetor ke ketua</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-arrears">-</div>
        <div class="stat-label">Dana Yang dipegang bendahara saat ini</div>
      </div>
    </div>
    
    <div class="members-section">
      <div class="section-title">👥 Anggota</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Cari nama atau nomor rumah..." oninput="handleSearch()">
      </div>
      <div id="members-container">
        <div class="loading">Memuat data...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
    
    <div class="footer">
      Blok D Iuran 2026 • Updated otomatis
    </div>
  </div>
  
  <script>
    const MONTHS = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
    const MONTH_NAMES = {
      jan: 'Jan', feb: 'Feb', mar: 'Mar', apr: 'Apr',
      may: 'Mei', jun: 'Jun', jul: 'Jul', aug: 'Agu',
      sep: 'Sep', oct: 'Okt', nov: 'Nov', dec: 'Des'
    };
    
    const API_BASE = 'https://genres-delight-outcomes-mike.trycloudflare.com';
    
    async function fetchData() {
      try {
        const [membersRes, statsRes] = await Promise.all([
          fetch(`${API_BASE}/api/members`),
          fetch(`${API_BASE}/api/stats`)
        ]);
        
        const membersData = await membersRes.json();
        const statsData = await statsRes.json();
        
        renderStats(statsData);
        renderMembers(membersData);
      } catch (error) {
        document.getElementById('members-container').innerHTML = 
          '<div class="error">Gagal memuat data. Pastikan server berjalan.</div>';
      }
    }
    
    function renderStats(stats) {
      document.getElementById('total-collected').textContent = `Rp ${(stats.totalPaid || 0).toLocaleString('id-ID')}`;
      document.getElementById('total-arrears').textContent = `Rp ${(stats.bendahara || 0).toLocaleString('id-ID')}`;
      document.getElementById('collect-percent').textContent = `Rp ${(stats.setorKeKetua || 0).toLocaleString('id-ID')}`;
      const memberCountEl = document.getElementById('member-count');
      if (memberCountEl) memberCountEl.textContent = stats.totalMembers || 0;
    }
    
    let allMembers = [];
    let currentPage = 1;
    const itemsPerPage = 6;
    let searchQuery = '';
    
    function renderMembers(data) {
      const container = document.getElementById('members-container');
      const paginationContainer = document.getElementById('pagination');
      
      if (!data.members || data.members.length === 0) {
        container.innerHTML = '<div class="loading">Belum ada anggota.</div>';
        paginationContainer.innerHTML = '';
        return;
      }
      
      allMembers = [...data.members];
      
      // Sort by house number only (D1, D2, D3...)
      allMembers.sort((a, b) => {
        const aNum = parseInt((a.houseNumber || 'D0').replace(/\D/g, ''));
        const bNum = parseInt((b.houseNumber || 'D0').replace(/\D/g, ''));
        return aNum - bNum;
      });
      
      // Filter based on search
      let filtered = allMembers;
      if (searchQuery) {
        filtered = allMembers.filter(m => {
          const house = (m.houseNumber || '').toLowerCase();
          const name = (m.name || '').toLowerCase();
          return house.includes(searchQuery) || name.includes(searchQuery);
        });
      }
      
      // Pagination
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (currentPage > totalPages) currentPage = totalPages || 1;
      
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageMembers = filtered.slice(start, end);
      
      let html = '<div class="members-grid">';
      pageMembers.forEach(member => {
        const amountDisplay = member.isException ? 40000 : (member.amount || 50000);
        const monthsPaid = Object.values(member.payments).filter(v => v).length;
        
        // Build paid months string
        const paidMonthsList = MONTHS.filter(m => member.payments[m]).map(m => MONTH_NAMES[m]);
        const statusText = paidMonthsList.length > 0 ? paidMonthsList.join(', ') : 'Belum Ada Bayar';
        
        html += `
          <div class="member-card">
            <div class="member-house">${member.houseNumber || ''}</div>
            <div class="member-name">${member.name || '-'}</div>
            ${paidMonthsList.length > 0 ? `
              <div class="months-grid">
                ${paidMonthsList.map(m => `
                  <div class="month-item">
                    <div class="month-name">${m}</div>
                  </div>
                `).join('')}
              </div>
            ` : `<div class="member-status negative">Belum Ada Bayar</div>`}
            <div class="member-paid">${monthsPaid}x • Rp ${amountDisplay.toLocaleString('id-ID')}</div>
          </div>
        `;
      });
      html += '</div>';
      
      container.innerHTML = html;
      
      // Render pagination
      if (totalPages > 1) {
        paginationContainer.innerHTML = `
          <button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>← Sebelumnya</button>
          <span class="page-info">Halaman ${currentPage} dari ${totalPages}</span>
          <button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Selanjutnya →</button>
        `;
      } else {
        paginationContainer.innerHTML = '';
      }
    }
    
    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      currentPage = 1;
      renderMembers({ members: allMembers });
    }
    
    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderMembers({ members: allMembers });
      }
    }
    
    function nextPage() {
      const filtered = searchQuery 
        ? allMembers.filter(m => {
            const house = (m.houseNumber || '').toLowerCase();
            const name = (m.name || '').toLowerCase();
            return house.includes(searchQuery) || name.includes(searchQuery);
          })
        : allMembers;
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderMembers({ members: allMembers });
      }
    }
    
    // Initial load
    fetchData();
    
    // Auto refresh every 30 seconds
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
